name: CI

on:
  push:
    branches: [main, master, staging]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for branch/PR refs; let tag builds always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

# Minimal permissions by default; individual jobs add only what they need.
permissions:
  contents: read

env:
  IMAGE: 1121citrus/rotate-aws-backups

jobs:
  # ── Stage 1: Lint ──────────────────────────────────────────────────────────
  lint:
    uses: 1121citrus/shared-github-workflows/.github/workflows/lint.yml@main

  # ── Stage 2: Build ─────────────────────────────────────────────────────────
  # Build image for scanning and smoke tests.  The bats test suite uses mock
  # binaries in test/bin/ so it does not require the Docker image and runs
  # in parallel with (not after) build.
  build:
    needs: lint
    uses: 1121citrus/shared-github-workflows/.github/workflows/build.yml@main
    with:
      image: 1121citrus/rotate-aws-backups

  # ── Stage 3: Test ──────────────────────────────────────────────────────────
  # Bats tests mount the project source read-only into the bats container.
  # Mock binaries in test/bin/ stub aws, jq, and rotate-backups, so no
  # host packages are required.  Runs in parallel with build after lint.
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run bats tests
        run: |
          docker run -i --rm \
            -v "$PWD:/code:ro" \
            -w /code \
            bats/bats:1.13.0 \
              test/01-dockerfile.bats \
              test/02-functional.bats \
              test/03-build.bats

  # ── Stage 3b: Image smoke test ─────────────────────────────────────────────
  # Run one built-image smoke test to catch packaging/runtime regressions not
  # visible in source-mounted bats tests.
  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: gunzip -c /tmp/image.tar.gz | docker load
      - name: Verify bash is available
        run: docker run --rm --entrypoint bash "$IMAGE:latest" --version
      - name: Verify aws CLI is available
        run: docker run --rm --entrypoint aws "$IMAGE:latest" --version
      - name: Verify jq is available
        run: docker run --rm --entrypoint jq "$IMAGE:latest" --version
      # rotate-backups CLI does not consistently support --version.
      - name: Verify rotate-backups executable is available
        run: docker run --rm --entrypoint rotate-backups "$IMAGE:latest" --help
      - name: Verify rotate-backups package is importable
        run: docker run --rm --entrypoint python "$IMAGE:latest" -c "import rotate_backups; print(getattr(rotate_backups, '__version__', 'installed'))"
      - name: Verify common-functions is installed
        run: docker run --rm --entrypoint test "$IMAGE:latest" -f /usr/local/include/common-functions
      - name: Verify entrypoint --help exits 0
        run: docker run --rm "$IMAGE:latest" --help
      - name: Verify entrypoint --version exits 0
        run: docker run --rm "$IMAGE:latest" --version
      - name: Verify entrypoint version matches embedded version file
        run: |
          docker run --rm --entrypoint sh "$IMAGE:latest" -c '
            test "$(/usr/local/bin/rotate-aws-backups --version)" = "$(cat /usr/local/share/rotate-aws-backups/version)"
          '
      - name: Verify healthcheck is executable
        run: docker run --rm --entrypoint test "$IMAGE:latest" -x /usr/local/bin/healthcheck
      - name: Run image smoke test
        run: |
          docker inspect --format '{{json .Config.Entrypoint}}' "$IMAGE:latest" \
            | grep -Fx '["/usr/local/bin/rotate-aws-backups"]'
          docker run --rm "$IMAGE:latest" --help > /dev/null

  # ── Stage 4: Security scan ─────────────────────────────────────────────────
  scan:
    needs: build
    uses: 1121citrus/shared-github-workflows/.github/workflows/scan.yml@main
    with:
      image: 1121citrus/rotate-aws-backups

  # ── Stage 5: Push to Docker Hub ────────────────────────────────────────────
  push:
    needs: [scan, smoke-test, test]
    if: >
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/v') ||
        github.ref == 'refs/heads/staging'
      )
    uses: 1121citrus/shared-github-workflows/.github/workflows/push.yml@main
    with:
      image: 1121citrus/rotate-aws-backups
    secrets: inherit
