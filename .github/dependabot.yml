# Dependabot configuration.
#
# Dependabot opens automated PRs to keep dependencies current.
# Each update group is checked daily (UTC).
#
# References:
#   https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # ── GitHub Actions ──────────────────────────────────────────────────────────
  # Keeps action versions in .github/workflows/*.yml up to date.
  # Dependabot will also propose SHA-pinned updates, which is the recommended
  # hardening step for supply-chain security (SLSA / OpenSSF Scorecards).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "github-actions"

  # ── Docker ──────────────────────────────────────────────────────────────────
  # Tracks both FROM lines pinned directly in the Dockerfile:
  #   golang:1.26.2-alpine  — supercronic builder stage
  #   python:3.13-alpine3.23 — runtime stage
  #
  # Python 3.13+ removed the `pipes` stdlib module (PEP 594). The
  # `rotate-backups` package depends on `executor`, which imports `pipes` at
  # module level (executor/__init__.py). Neither package has been updated since
  # 2020 and there is no Python 3.13-compatible release of either.
  # Python minor/major bumps are therefore blocked until a maintained
  # replacement for rotate-backups is adopted.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # ── Python pip ───────────────────────────────────────────────────────────────
  # Keeps requirements.txt transitive-patch dependencies up to date.
  # Note: rotate-backups itself is intentionally unpinned here; its version
  # is injected at build time via ROTATE_BACKUPS_VERSION build-arg.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "python"
