# Dependabot configuration.
#
# Dependabot opens automated PRs to keep dependencies current.
# Each update group is checked weekly on Monday mornings (UTC).
#
# References:
#   https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # ── GitHub Actions ──────────────────────────────────────────────────────────
  # Keeps action versions in .github/workflows/*.yml up to date.
  # Dependabot will also propose SHA-pinned updates, which is the recommended
  # hardening step for supply-chain security (SLSA / OpenSSF Scorecards).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "github-actions"

  # ── Docker ──────────────────────────────────────────────────────────────────
  # Tracks both FROM lines pinned directly in the Dockerfile:
  #   golang:1.26.2-alpine  — supercronic builder stage
  #   python:3.12-alpine3.22 — runtime stage
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"

  # ── Python pip ───────────────────────────────────────────────────────────────
  # Keeps requirements.txt transitive-patch dependencies up to date.
  # Note: rotate-backups itself is intentionally unpinned here; its version
  # is injected at build time via ROTATE_BACKUPS_VERSION build-arg.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "python"
